

# CRITICAL: All containers must use network_mode: host
# Docker bridge networking causes FreeSWITCH to advertise internal IPs
# in SDP, making RTP unreachable from external callers.

services:

  drachtio:
    image: drachtio/drachtio-server:latest
    container_name: drachtio
    restart: unless-stopped
    network_mode: host
    command: >
      drachtio --contact "sip:*:5070;transport=tcp,udp" --external-ip ${EXTERNAL_IP:-127.0.0.1} --secret ${DRACHTIO_SECRET:-cymru} --port 9022 --loglevel info
    # Ports (for reference - host mode doesn't need port mapping):
    # - 5070: SIP UDP/TCP (5070 to avoid conflict with FreePBX on 5060)
    # - 9022: Admin/App Port

  freeswitch:
    image: drachtio/drachtio-freeswitch-mrf:latest
    container_name: freeswitch
    restart: unless-stopped
    network_mode: host
    command: >
      freeswitch --sip-port 5080 --rtp-range-start 30000 --rtp-range-end 30100 --ext-rtp-ip ${EXTERNAL_IP:-127.0.0.1} --ext-sip-ip ${EXTERNAL_IP:-127.0.0.1} --advertise-external-ip
    environment:
      # CRITICAL: Set this to your server's LAN IP
      # This IP goes into SDP packets so the PBX knows where to send audio
      # Note: drachtio-freeswitch-mrf only accepts CLI flags, not env vars
      - EXTERNAL_IP=${EXTERNAL_IP:-127.0.0.1}
    # Ports (for reference):
    # - 8021: ESL (Event Socket Library)
    # - 5080: Internal SIP
    # - 30000-30100: RTP Audio (changed from 20000-20100 to avoid conflict with standard PBX SBC ports)

  voice-app:
    build: 
      context: ./voice-app
      network: host
    container_name: voice-app
    restart: unless-stopped
    network_mode: host
    env_file:
      - path: .env
        required: false
    volumes:
      # Audio files directory for TTS playback
      - ./voice-app/audio:/app/audio
      # Device configurations
      - ./voice-app/config:/app/config
      # Voicemail Access (requires SSHFS mount on host)
      - ./voice-app/mounts/voicemail:/var/spool/asterisk/voicemail
      # Call recordings (transcripts + audio)
      - call-recordings:/app/recordings
    # Note: In distributed setups, drachtio + freeswitch run on Machine 3.
    # Only list local container dependencies here.
    # depends_on:
    #   - drachtio      # Remote on Machine 3 in distributed mode
    #   - freeswitch    # Remote on Machine 3 in distributed mode
    #   - whisper-stt   # Remote on Machine 3 in distributed mode
    #   - kokoro-tts    # Remote on Machine 3 in distributed mode
    # Ports (for reference):
    # - 3000: HTTP API
    # - 3001: WebSocket for audio streaming

  whisper-stt:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: whisper-stt
    restart: unless-stopped
    network_mode: host
    environment:
      - WHISPER__MODEL=${WHISPER_HF_MODEL:-Systran/faster-whisper-large-v3}
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8080
    volumes:
      - whisper-models:/root/.cache/huggingface
    # Ports (for reference - host mode):
    # - 8080: OpenAI-compatible STT API (/v1/audio/transcriptions)

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    network_mode: host
    volumes:
      - kokoro-models:/app/api/src/core/lib
    # Ports (for reference - host mode):
    # - 8880: OpenAI-compatible TTS API (/v1/audio/speech)

volumes:
  whisper-models:
  kokoro-models:
  call-recordings:
